services:
  - type: web
    name: cryptoedge-api
    runtime: node
    branch: no-claude
    buildCommand: npm install --production
    startCommand: node server.js
    plan: free

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000          # Render's default; server.js already reads process.env.PORT
      - key: GEMINI_API_KEY
        sync: false           # Mark as secret — enter value in Render dashboard
      - key: ALLOWED_ORIGIN
        sync: false           # Set to your GitHub Pages URL, e.g. https://yourname.github.io/crypto-terminal
