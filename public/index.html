<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b0f1a" />
    <meta name="description" content="Real-time crypto trading terminal with RSI, MACD, Bollinger Bands and AI signal recommendations." />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>CryptoEdge Pro — Live Crypto Trading Terminal</title>

    <!-- Skeleton.css fonts (Raleway for headings, Roboto Mono for terminal monospace) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Skeleton CSS framework -->
    <link rel="stylesheet" href="%PUBLIC_URL%/skeleton.css" />

    <style>
      /* Reset html font-size back for the terminal (Skeleton sets 62.5% for rem scaling) */
      html { font-size: 100%; }
      html, body, #root { height: 100%; margin: 0; padding: 0; }
      /* Dark base — overridden per theme via data-theme attribute */
      body { background: #0b0f1a; color: #b8cce0; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
